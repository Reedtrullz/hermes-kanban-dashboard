{% extends "base.html" %}
{% block title %}{{ proposal.title }} - Hermes{% endblock %}
{% block nav_cards %}is-active{% endblock %}
{% block header %}
<div class="app-header">
  <div class="breadcrumb">
    <a href="/proposals">Cards</a>
    <span>›</span>
    <a href="/proposals/{{ proposal.id }}" style="color:var(--text)">{{ proposal.title }}</a>
  </div>
</div>
{% endblock %}
{% block content %}
<div id="proposal-content" hx-get="/api/proposals/{{ proposal.id }}/fragment" hx-trigger="every 5s" hx-swap="outerHTML">
  {% include "_proposal_detail_fragment.html" %}
</div>
<script>
document.addEventListener('focusin',function(e){
  if(e.target.closest('form')) document.getElementById('proposal-content').setAttribute('hx-trigger','manual');
});
document.addEventListener('focusout',function(e){
  if(e.target.closest('form')) document.getElementById('proposal-content').setAttribute('hx-trigger','every 5s');
});
</script>
{% endblock %}
