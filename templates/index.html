<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Kanban{% if board != 'default' %} — {{ board }}{% endif %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --yellow: #d2991d; --red: #f85149;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
    header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:8px 16px; display:flex; align-items:center; gap:12px;
    }
    header h1 { font-size:15px; font-weight:600; white-space:nowrap; }
    .board-selector {
      font-size:12px; padding:4px 8px; background:var(--bg);
      border:1px solid var(--border); border-radius:4px; color:var(--text);
      cursor:pointer;
    }
    .board {
      display:flex; gap:1px; height:calc(100vh - 44px); overflow-x:auto; background:var(--border);
    }
    .column {
      flex:1; min-width:220px; max-width:380px; background:var(--bg); display:flex; flex-direction:column;
    }
    .column-header {
      padding:6px 10px; font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:0.5px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; color:var(--muted);
    }
    .column-header .count { background:var(--surface); padding:1px 6px; border-radius:8px; font-size:10px; }
    .column-body {
      flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:4px;
    }
    .task-card {
      background:var(--surface); border:1px solid var(--border); border-radius:6px;
      padding:8px 10px; cursor:pointer; transition:border-color 0.15s; font-size:12px;
    }
    .task-card:hover { border-color:var(--accent); }
    .task-card .task-title { font-weight:500; margin-bottom:2px; word-break:break-word; }
    .task-card .task-meta { font-size:10px; color:var(--muted); display:flex; gap:6px; flex-wrap:wrap; }
    .badge { display:inline-block; padding:1px 5px; border-radius:4px; font-size:9px; font-weight:600; }
    .badge-fail { background:#3d1e1e; color:var(--red); }
    .badge-running { background:#1a2e1a; color:var(--green); }
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
      z-index:100; align-items:center; justify-content:center;
    }
    .modal-overlay.active { display:flex; }
    .modal {
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:16px; max-width:560px; width:90%; max-height:80vh; overflow-y:auto;
    }
    .modal h2 { margin-bottom:8px; font-size:15px; }
    .field { margin-bottom:8px; }
    .field label { display:block; font-size:10px; color:var(--muted); margin-bottom:2px; text-transform:uppercase; }
    .field input,.field textarea,.field select {
      width:100%; background:var(--bg); border:1px solid var(--border); border-radius:4px;
      padding:5px 8px; color:var(--text); font-size:12px; font-family:inherit;
    }
    .field textarea { min-height:60px; resize:vertical; }
    .btn {
      display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:5px;
      border:1px solid var(--border); background:var(--surface); color:var(--text);
      font-size:11px; cursor:pointer; transition:background 0.15s;
    }
    .btn:hover { background:var(--border); }
    .btn-primary { background:#1f6feb; border-color:#1f6feb; color:white; }
    .btn-primary:hover { background:#388bfd; }
    .btn-sm { padding:2px 6px; font-size:10px; }
    .new-task-btn {
      display:block; width:100%; padding:5px; background:none; border:1px dashed var(--border);
      border-radius:6px; color:var(--muted); font-size:11px; cursor:pointer; margin-top:2px;
    }
    .new-task-btn:hover { border-color:var(--accent); color:var(--accent); }
    .comments,.runs { margin-top:8px; }
    .comment,.run { border-top:1px solid var(--border); padding:5px 0; font-size:11px; }
    .comment .author { color:var(--muted); font-size:10px; }
  </style>
</head>
<body>
<header>
  <h1>Kanban</h1>
  <select class="board-selector" onchange="location.href='/board/'+this.value">
    {% for b in boards %}
    <option value="{{ b.slug }}" {% if b.slug == board %}selected{% endif %}>{{ b.name }}</option>
    {% endfor %}
  </select>
</header>

<div class="board" id="board"
     hx-get="/board/{{ board }}?fragment=1"
     hx-trigger="every 30s"
     hx-swap="outerHTML"
     hx-vals='{"board":"{{ board }}"}'>
  {% for col in COLUMNS %}
  <div class="column" id="col-{{ col }}">
    <div class="column-header">
      <span>{{ STATUS_LABELS[col] }}</span>
      <span class="count">{{ tasks_by_status[col]|length }}</span>
    </div>
    <div class="column-body">
      {% for task in tasks_by_status[col] %}
        {% with task=task, board=board %}{% include "_task_card.html" %}{% endwith %}
      {% endfor %}
      {% if col == 'todo' %}
      <button class="new-task-btn" onclick="showNewTask('{{ board }}')">+ New Task</button>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>

<!-- New task modal -->
<div class="modal-overlay" id="new-task-modal">
  <div class="modal">
    <h2>New Task</h2>
    <form hx-post="/api/tasks" hx-target="#col-todo .column-body" hx-swap="beforeend"
          hx-on::after-request="document.getElementById('new-task-modal').classList.remove('active')">
      <input type="hidden" name="board" id="new-task-board" value="{{ board }}">
      <div class="field"><label>Title</label><input name="title" required autofocus></div>
      <div class="field"><label>Description</label><textarea name="body" rows="2"></textarea></div>
      <div class="field"><label>Assignee</label>
        <select name="assignee">
          <option value="">— none —</option>
          {% for a in assignees %}<option value="{{ a }}">{{ a }}</option>{% endfor %}
        </select>
      </div>
      <div class="field"><label>Priority</label><input name="priority" type="number" value="0" min="0" max="100"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn" onclick="document.getElementById('new-task-modal').classList.remove('active')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Task detail modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal" id="task-modal-content"></div>
</div>

<script>
  const CURRENT_BOARD = "{{ board }}";

  function showNewTask(board) {
    document.getElementById('new-task-board').value = board || CURRENT_BOARD;
    document.getElementById('new-task-modal').classList.add('active');
  }

  async function openTask(id) {
    const modal = document.getElementById('task-modal');
    const content = document.getElementById('task-modal-content');
    content.innerHTML = '<p style="color:var(--muted)">Loading...</p>';
    modal.classList.add('active');
    try {
      const res = await fetch('/api/tasks/' + id + '?board=' + CURRENT_BOARD);
      const t = await res.json();
      if (t.error) { content.innerHTML = '<p>Not found</p>'; return; }
      content.innerHTML = renderTaskDetail(t, id);
    } catch(e) { content.innerHTML = '<p>Error</p>'; }
  }

  function renderTaskDetail(t, id) {
    const runs = (t.runs||[]).map(r =>
      `<div class="run"><strong>${esc(r.profile||'?')}</strong>: ${esc(r.outcome||r.status)} — ${esc(r.summary||'')}</div>`
    ).join('');
    const comments = (t.comments||[]).map(c =>
      `<div class="comment"><span class="author">${esc(c.author)}</span>: ${esc(c.body)}</div>`
    ).join('');
    const parents = (t.parents||[]).map(p => `<a href="#" onclick="openTask('${p}');return false" style="color:var(--accent)">${p.substring(0,14)}</a>`).join(', ') || 'none';
    const children = (t.children||[]).map(c => `<a href="#" onclick="openTask('${c}');return false" style="color:var(--accent)">${c.substring(0,14)}</a>`).join(', ') || 'none';
    const statusBtns = ['todo','ready','in_progress','blocked','done','archived'].map(s =>
      `<button class="btn btn-sm ${s===t.status?'btn-primary':''}"
               hx-patch="/api/tasks/${id}/status" hx-vals='{"status":"${s}","board":"${CURRENT_BOARD}"}'
               hx-target="#task-${id}" hx-swap="outerHTML"
               hx-on::after-request="document.getElementById('task-modal').classList.remove('active')">→ ${s.replace('_',' ')}</button>`
    ).join('');

    return `
      <div style="display:flex;justify-content:space-between;align-items:start">
        <h2>${esc(t.title)}</h2>
        <button class="btn btn-sm" onclick="document.getElementById('task-modal').classList.remove('active')">✕</button>
      </div>
      <div style="margin-bottom:8px;font-size:11px;color:var(--muted)">
        ID: ${id.substring(0,16)} · Status: ${esc(t.status)} · Assignee: ${esc(t.assignee||'none')} · Priority: ${t.priority}
      </div>
      ${t.body?`<div style="margin-bottom:8px;white-space:pre-wrap;font-size:12px">${esc(t.body)}</div>`:''}
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">${statusBtns}</div>
      <div style="font-size:11px;color:var(--muted)">Parents: ${parents} · Children: ${children}</div>
      ${runs?`<div class="runs"><h3 style="font-size:12px;margin-bottom:4px">Runs (${t.runs.length})</h3>${runs}</div>`:''}
      ${comments?`<div class="comments"><h3 style="font-size:12px;margin-bottom:4px">Comments (${t.comments.length})</h3>${comments}</div>`:''}
      <form style="margin-top:8px;display:flex;gap:4px"
            hx-post="/api/tasks/${id}/comments" hx-vals='{"board":"${CURRENT_BOARD}"}'
            hx-on::after-request="this.reset();openTask('${id}')">
        <input name="body" placeholder="Add comment..." style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-size:11px">
        <button type="submit" class="btn btn-sm btn-primary">Post</button>
      </form>`;
  }

  function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  document.getElementById('task-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active');});
</script>
</body>
</html>
