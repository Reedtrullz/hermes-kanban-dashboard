- name: Deploy Proposals Dashboard proxy config
  hosts: vps
  become: yes
  gather_facts: no

  vars:
    domain: reidar.tech
    proxy_port: 8089
    caddyfile: /etc/caddy/Caddyfile

  tasks:
    - name: Read current Caddyfile
      slurp:
        src: "{{ caddyfile }}"
      register: _caddy

    - name: Normalize Caddyfile content
      set_fact:
        caddy_content: "{{ _caddy.content | b64decode }}"

    - name: Check if proposals block already exists
      set_fact:
        proposals_exists: "{{ 'Hermes Proposals Dashboard' in caddy_content }}"

    - name: Add proposals route handlers to Caddyfile
      blockinfile:
        path: "{{ caddyfile }}"
        insertafter: "^{{ domain | regex_escape }}\\s*\\{"
        marker: "  # {mark} Hermes Proposals Dashboard (managed by Ansible)"
        block: |
            handle /proposals* {
              reverse_proxy localhost:{{ proxy_port }}
            }
            handle /api/proposals* {
              reverse_proxy localhost:{{ proxy_port }}
            }
            handle /api/agents* {
              reverse_proxy localhost:{{ proxy_port }}
            }
        mode: "0644"
      register: _caddy_update

    - name: Validate Caddy config
      command: caddy validate --config {{ caddyfile }}
      changed_when: false

    - name: Reload Caddy
      command: caddy reload --config {{ caddyfile }}
      when: _caddy_update.changed

    - name: Report
      debug:
        msg: >
          {% if _caddy_update.changed %}
          Caddy updated and reloaded. Ensure the tunnel is running on the local machine.
          {% else %}
          Caddy config already up to date — no changes needed.
          {% endif %}
